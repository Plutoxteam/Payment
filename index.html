<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PlutoXTeam - Aktivasi</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-container {
            margin-bottom: 20px;
        }
        
        .logo {
            max-width: 120px;
            max-height: 80px;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .logo-fallback {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
            letter-spacing: 1px;
            display: none;
        }
        
        .logo-fallback span {
            color: #764ba2;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 16px;
        }
        
        .features {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .feature-item:last-child {
            margin-bottom: 0;
        }
        
        .feature-icon {
            width: 32px;
            height: 32px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-weight: 700;
        }
        
        .feature-text {
            flex: 1;
        }
        
        .feature-text strong {
            display: block;
            color: #333;
            font-size: 15px;
        }
        
        .feature-text small {
            color: #888;
            font-size: 13px;
        }
        
        .btn {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 12px 0;
            text-decoration: none;
            border: none;
        }
        
        .btn-premium {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }
        
        .btn-trial {
            background: linear-gradient(135deg, #f0933b 0%, #e67e22 100%);
        }
        
        .btn-admin {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }
        
        /* TOMBOL DOWNLOAD BARU */
        .btn-download {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-copy {
            background: #6c757d;
            margin: 10px 0;
        }
        
        .footer {
            margin-top: 24px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .footer strong {
            color: #667eea;
        }
        
        /* NOTIFIKASI */
        .notification {
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
            animation: slideIn 0.3s ease;
            border-left-width: 4px;
            border-left-style: solid;
        }
        
        .notification.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }
        
        .notification.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        
        .notification.success {
            background: #d4edda;
            border-left-color: #28a745;
        }
        
        .notification.info {
            background: #d1ecf1;
            border-left-color: #17a2b8;
        }
        
        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notification-message {
            font-size: 14px;
            margin-left: 28px;
        }
        
        /* FORM TRIAL */
        .trial-form {
            background: #f0f7ff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid #cce5ff;
        }
        
        .trial-form h3 {
            color: #0056b3;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 15px;
            transition: border 0.2s;
        }
        
        .form-group input:focus {
            border-color: #0056b3;
            outline: none;
        }
        
        .form-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            margin-left: 16px;
        }
        
        .key-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .success-box {
            background: #d4edda;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #c3e6cb;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="PlutoXTeam Logo" class="logo" id="mainLogo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
            <div class="logo-fallback" id="logoFallback" style="display:none;">
                Pluto<span>XTeam</span>
            </div>
        </div>
        
        <!-- NOTIFIKASI AREA -->
        <div id="notificationArea"></div>
        
        <!-- MENU UTAMA -->
        <div id="mainMenu">
            <h1>Pilih Opsi Aktivasi</h1>
            <div class="subtitle">Dapatkan akses premium ke PlutoXTeam</div>
            
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">✓</div>
                    <div class="feature-text">
                        <strong>Akses Penuh</strong>
                        <small>Semua fitur aplikasi</small>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-text">
                        <strong>Tanpa Iklan</strong>
                        <small>Bebas gangguan iklan</small>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔄</div>
                    <div class="feature-text">
                        <strong>Update Gratis</strong>
                        <small>Semua pembaruan terbaru</small>
                    </div>
                </div>
            </div>
            
            <!-- TOMBOL BELI PREMIUM -->
            <a href="https://sandbox.doku.com/p-link/..." class="btn btn-premium" target="_blank">
                💳 Beli Key Premium (Rp 50.000)
            </a>
            
            <!-- TOMBOL TRIAL -->
            <button onclick="handleTrialClick()" class="btn btn-trial" id="trialButton">
                🎁 Coba Gratis 3 Hari
            </button>
            
            <!-- TOMBOL UNDUH APK (BARU!) -->
            <a href="download.html" class="btn btn-download">
                📱 Unduh Aplikasi
            </a>
            
            <!-- TOMBOL ADMIN -->
            <a href="https://wa.me/6285849299253?text=Halo%20admin%20PlutoXTeam%2C%20saya%20ingin%20bertanya" class="btn btn-admin" target="_blank">
                📞 Hubungi Admin (085849299253)
            </a>
            
            <div class="footer">
                <strong>PlutoXTeam</strong> · Pilih sesuai kebutuhan
            </div>
        </div>
        
        <!-- AREA TRIAL -->
        <div id="trialArea" class="hidden"></div>
    </div>
    
    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            databaseURL: "https://sidiannext-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        
        const ADMIN_PHONE = '6285849299253';
        const WHAPI_TOKEN = 'dUtoaA65nf39YiR4oJweRlGP5fCPZXek';
        const DOKU_LINK = 'https://sandbox.doku.com/p-link/...'; // Ganti dengan link DOKU asli
        
        function formatPhoneNumber(phone) {
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.startsWith('0')) {
                return '62' + cleaned.substring(1);
            }
            if (!cleaned.startsWith('62')) {
                return '62' + cleaned;
            }
            return cleaned;
        }
        
        function showNotification(type, title, message) {
            const area = document.getElementById('notificationArea');
            const icons = {
                warning: '⚠️',
                error: '❌',
                success: '✅',
                info: 'ℹ️'
            };
            
            area.innerHTML = `
                <div class="notification ${type}">
                    <div class="notification-title">
                        <span>${icons[type] || 'ℹ️'}</span>
                        <span>${title}</span>
                    </div>
                    <div class="notification-message">${message}</div>
                </div>
            `;
        }
        
        function handleTrialClick() {
            const params = new URLSearchParams(window.location.search);
            const deviceId = params.get('device_id');
            
            if (!deviceId) {
                showNotification('warning', 'Akses Trial Dibatasi', 
                    'Untuk menggunakan key trial, harus masuk melalui aplikasi dan klik tombol "Coba Gratis 3 Hari" di dalam aplikasi.');
                return;
            }
            
            prosesTrial(deviceId);
        }
        
        async function prosesTrial(deviceId) {
            const mainMenu = document.getElementById('mainMenu');
            const trialArea = document.getElementById('trialArea');
            
            mainMenu.classList.add('hidden');
            trialArea.classList.remove('hidden');
            trialArea.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ Memeriksa status device...</div>';
            
            try {
                const snapshot = await firebase.database().ref('trial_history/' + deviceId).once('value');
                
                if (snapshot.exists()) {
                    trialArea.innerHTML = `
                        <div class="notification error" style="margin-top: 0;">
                            <div class="notification-title">❌ Trial Gagal</div>
                            <div class="notification-message">Device ini sudah pernah menggunakan trial sebelumnya.</div>
                        </div>
                        <a href="https://wa.me/${ADMIN_PHONE}?text=Halo%20admin%20PlutoXTeam%2C%20saya%20ingin%20bertanya" class="btn btn-admin" target="_blank">
                            📞 Hubungi Admin
                        </a>
                        <button onclick="kembaliKeMenu()" class="btn" style="background: #6c757d;">⬅️ Kembali</button>
                    `;
                } else {
                    trialArea.innerHTML = `
                        <h2 style="margin-bottom: 20px;">Coba Gratis 3 Hari</h2>
                        <div class="trial-form">
                            <h3>📋 Isi Data Trial</h3>
                            
                            <div class="form-group">
                                <label>Nama</label>
                                <input type="text" id="trialName" placeholder="Masukkan nama lengkap">
                            </div>
                            
                            <div class="form-group">
                                <label>Nomor WhatsApp</label>
                                <input type="tel" id="trialPhone" placeholder="Contoh: 081234567890">
                                <div class="form-hint">Gunakan nomor aktif untuk menerima key</div>
                            </div>
                            
                            <button onclick="generateTrialKey('${deviceId}')" class="btn btn-trial" id="generateBtn">
                                🔑 Generate Key Trial
                            </button>
                            
                            <button onclick="kembaliKeMenu()" class="btn" style="background: #6c757d; margin-top: 10px;">
                                ⬅️ Kembali
                            </button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                trialArea.innerHTML = `
                    <div class="notification error">
                        <div class="notification-title">❌ Error</div>
                        <div class="notification-message">Terjadi kesalahan. Silakan coba lagi.</div>
                    </div>
                    <button onclick="kembaliKeMenu()" class="btn" style="background: #6c757d;">⬅️ Kembali</button>
                `;
            }
        }
        
        window.generateTrialKey = async function(deviceId) {
            const name = document.getElementById('trialName')?.value.trim();
            let phone = document.getElementById('trialPhone')?.value.trim();
            
            if (!name || !phone) {
                showNotification('warning', 'Data Tidak Lengkap', 'Nama dan nomor WhatsApp harus diisi!');
                return;
            }
            
            if (phone.replace(/\D/g, '').length < 10) {
                showNotification('warning', 'Nomor Tidak Valid', 'Nomor WhatsApp minimal 10 digit!');
                return;
            }
            
            const formattedPhone = formatPhoneNumber(phone);
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Memproses...';
            
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let key = 'TRIAL-';
            for (let i = 0; i < 4; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            key += '-';
            for (let i = 0; i < 4; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            
            const expireDate = new Date();
            expireDate.setDate(expireDate.getDate() + 3);
            const expireStr = expireDate.toLocaleDateString('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            
            try {
                await firebase.database().ref('Keys/' + key).set({
                    Type: 'Duration',
                    Value: '3d',
                    MaxDevices: 1,
                    ActivatedAt: Date.now(),
                    Devices: null,
                    source: 'trial',
                    deviceId: deviceId,
                    name: name,
                    phone: formattedPhone
                });
                
                await firebase.database().ref('trial_history/' + deviceId).set({
                    key: key,
                    name: name,
                    phone: formattedPhone,
                    activatedAt: Date.now(),
                    expiresAt: expireDate.getTime()
                });
                
                try {
                    await fetch('https://gate.whapi.cloud/messages/text', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${WHAPI_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            to: formattedPhone,
                            body: `🎁 *KEY TRIAL PLUTOXTEAM 3 HARI* 🎁

Halo ${name},

Terima kasih telah mencoba Aplikasi PlutoXTeam.

🔑 *KEY TRIAL ANDA*
\`${key}\`

📋 *DETAIL*
• Masa berlaku: 3 hari
• Berlaku hingga: ${expireStr}
• Device ID: ${deviceId}

📌 *CARA AKTIVASI*
1. Buka aplikasi
2. Masukkan key: ${key}
3. Klik tombol Login
4. Nikmati trial selama 3 hari

Salam hangat,
*PlutoXTeam* 🚀`
                        })
                    });
                } catch (waError) {
                    console.log('WA gagal');
                }
                
                document.getElementById('trialArea').innerHTML = `
                    <div class="success-box">
                        <h3 style="color: #155724; margin-bottom: 15px;">✅ Key Trial Berhasil!</h3>
                        
                        <div style="background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; text-align: left;">
                            <div><strong>Nama:</strong> ${name}</div>
                            <div><strong>WA:</strong> ${formattedPhone}</div>
                            <div><strong>Berlaku hingga:</strong> ${expireStr}</div>
                        </div>
                        
                        <div class="key-display">${key}</div>
                        
                        <button onclick="copyKey('${key}')" class="btn btn-copy">📋 Copy Key</button>
                        
                        <p style="margin: 15px 0; color: #155724;">Key telah dikirim ke WhatsApp Anda.</p>
                        
                        <a href="${DOKU_LINK}" class="btn btn-premium" target="_blank">💳 Beli Premium (Rp 50.000)</a>
                        
                        <button onclick="kembaliKeMenu()" class="btn" style="background: #28a745; margin-top: 10px;">
                            ✅ Selesai
                        </button>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('error', 'Gagal', 'Gagal menyimpan key. Silakan coba lagi.');
                btn.disabled = false;
                btn.textContent = '🔑 Generate Key Trial';
            }
        };
        
        window.copyKey = function(key) {
            navigator.clipboard.writeText(key).then(() => {
                showNotification('success', 'Berhasil', 'Key berhasil disalin!');
                setTimeout(() => {
                    document.getElementById('notificationArea').innerHTML = '';
                }, 3000);
            });
        };
        
        window.kembaliKeMenu = function() {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('trialArea').classList.add('hidden');
            document.getElementById('trialArea').innerHTML = '';
            document.getElementById('notificationArea').innerHTML = '';
        };
        
        window.handleLogoError = function() {
            document.getElementById('mainLogo').style.display = 'none';
            document.getElementById('logoFallback').style.display = 'block';
        };
    </script>
</body>
</html>
