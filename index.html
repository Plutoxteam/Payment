<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PlutoXTeam - Aktivasi</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-container {
            margin-bottom: 20px;
        }
        
        .logo {
            max-width: 120px;
            max-height: 80px;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .logo-fallback {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
            letter-spacing: 1px;
            display: none;
        }
        
        .logo-fallback span {
            color: #764ba2;
        }
        
        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        
        .features {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
            border: 1px solid #eaeaea;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
        }
        
        .feature-item:last-child {
            border-bottom: none;
        }
        
        .feature-icon {
            width: 30px;
            height: 30px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-weight: bold;
        }
        
        .feature-text {
            flex: 1;
            color: #555;
            font-size: 14px;
        }
        
        .feature-text strong {
            color: #333;
            display: block;
            font-size: 15px;
        }
        
        .btn {
            display: block;
            padding: 16px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            margin: 12px 0;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-trial {
            background: white;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-admin {
            background: #25D366;
            color: white;
            margin-top: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-buy:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-trial:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }
        
        .btn-admin:hover {
            background: #128C7E;
        }
        
        .btn-copy {
            background: #6c757d;
            color: white;
            margin-top: 5px;
        }
        
        .btn-copy:hover {
            background: #5a6268;
        }
        
        .error-box {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .error-box h3 {
            color: #721c24;
            margin-bottom: 10px;
        }
        
        .error-box p {
            color: #721c24;
            margin-bottom: 15px;
        }
        
        .success-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .success-box h3 {
            color: #155724;
            margin-bottom: 10px;
        }
        
        .key-display {
            background: #155724;
            color: white;
            border-radius: 10px;
            padding: 20px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .footer strong {
            color: #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .copy-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .copy-notification.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- Konten akan diisi oleh JavaScript -->
    </div>
    
    <div class="copy-notification" id="copyNotification">✅ Key berhasil disalin</div>
    
    <script>
        // ============================================
        // KONFIGURASI
        // ============================================
        const firebaseConfig = {
            databaseURL: "https://sidiannext-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        
        const WHAPI_TOKEN = 'dUtoaA65nf39YiR4oJweRlGP5fCPZXek';
        const ADMIN_PHONE = '6285849299253';
        const DOKU_LINK = 'https://sandbox.doku.com/p-link/p/4TKocEd7kv';
        
        // ============================================
        // CEK DEVICE ID DARI URL
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('device_id');
        
        // ============================================
        // FUNGSI FORMAT NOMOR WA
        // ============================================
        function formatPhoneNumber(phone) {
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.startsWith('0')) {
                cleaned = '62' + cleaned.substring(1);
            } else if (!cleaned.startsWith('62')) {
                cleaned = '62' + cleaned;
            }
            return cleaned;
        }
        
        // ============================================
        // FUNGSI COPY KE CLIPBOARD
        // ============================================
        window.copyKey = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                const notification = document.getElementById('copyNotification');
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 2000);
            }).catch(() => alert('Gagal menyalin key'));
        };
        
        // ============================================
        // FUNGSI KEMBALI KE HALAMAN UTAMA
        // ============================================
        window.kembali = function() {
            window.location.href = 'https://plutoxteam.github.io/Payment/';
        };
        
        // ============================================
        // FUNGSI CEK SEBELUM TRIAL
        // ============================================
        window.checkTrialAccess = function() {
            if (!deviceId) {
                alert('❌ Untuk mendapatkan key trial, Anda harus membukanya dari aplikasi dengan klik tombol "Buy Key".');
                return false;
            }
            return true;
        };
        
        // ============================================
        // RENDER HALAMAN UTAMA
        // ============================================
        function renderHomePage() {
            return `
                <div class="logo-container">
                    <img src="logo.png" alt="PlutoXTeam Logo" class="logo" id="mainLogo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
                    <div class="logo-fallback" id="logoFallback" style="display:none;">
                        Pluto<span>XTeam</span>
                    </div>
                </div>
                
                <h2>Pilih Opsi Aktivasi</h2>
                <div class="subtitle">Dapatkan akses premium ke PlutoXTeam</div>
                
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">✓</div>
                        <div class="feature-text">
                            <strong>Akses Penuh</strong>
                            Semua fitur aplikasi
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⚡</div>
                        <div class="feature-text">
                            <strong>Tanpa Iklan</strong>
                            Bebas gangguan iklan
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🔄</div>
                        <div class="feature-text">
                            <strong>Update Gratis</strong>
                            Semua pembaruan terbaru
                        </div>
                    </div>
                </div>
                
                <a href="${DOKU_LINK}" class="btn btn-buy" target="_blank">
                    💳 Beli Key Premium (Rp 50.000)
                </a>
                
                <!-- TOMBOL TRIAL DENGAN PENGECEKAN -->
                <a href="#" id="trialBtn" class="btn btn-trial" onclick="event.preventDefault(); if(deviceId) { window.location.href='?device_id=' + deviceId; } else { alert('❌ Untuk mendapatkan key trial, Anda harus membukanya dari aplikasi dengan klik tombol \\'Buy Key\\'.'); }">
                    🎁 Coba Gratis 3 Hari
                </a>
                
                <a href="https://wa.me/${ADMIN_PHONE}?text=Halo%20admin%20PlutoXTeam%2C%20saya%20ingin%20bertanya" class="btn btn-admin" target="_blank">
                    📞 Hubungi Admin (085849299253)
                </a>
                
                <div class="footer">
                    <strong>PlutoXTeam</strong> • Pilih sesuai kebutuhan
                </div>
            `;
        }
        
        // ============================================
        // RENDER HALAMAN TRIAL (LOADING)
        // ============================================
        function renderTrialPage() {
            return `
                <div class="logo-container">
                    <img src="logo.png" alt="PlutoXTeam Logo" class="logo" id="mainLogo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
                    <div class="logo-fallback" id="logoFallback" style="display:none;">
                        Pluto<span>XTeam</span>
                    </div>
                </div>
                
                <h2>Coba Gratis 3 Hari</h2>
                <div class="subtitle">Memeriksa riwayat device...</div>
                
                <div class="loading"></div>
            `;
        }
        
        // ============================================
        // RENDER HALAMAN ERROR
        // ============================================
        function renderErrorPage(title, message, showBuy = true) {
            return `
                <div class="logo-container">
                    <img src="logo.png" alt="PlutoXTeam Logo" class="logo" id="mainLogo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
                    <div class="logo-fallback" id="logoFallback" style="display:none;">
                        Pluto<span>XTeam</span>
                    </div>
                </div>
                
                <h2>${title}</h2>
                <div class="error-box">
                    <h3>❌ ${message}</h3>
                    ${showBuy ? `<p>Silakan beli key premium untuk melanjutkan.</p>` : ''}
                    ${showBuy ? `<a href="${DOKU_LINK}" class="btn btn-buy" target="_blank">💳 Beli Premium (Rp 50.000)</a>` : ''}
                    <button onclick="kembali()" class="btn" style="background: #28a745;">
                        ✅ Kembali ke Halaman Utama
                    </button>
                </div>
                
                <div class="footer">
                    <strong>PlutoXTeam</strong> • Hubungi admin jika ada kendala
                </div>
            `;
        }
        
        // ============================================
        // RENDER FORM TRIAL
        // ============================================
        function renderTrialForm(deviceId) {
            return `
                <div class="logo-container">
                    <img src="logo.png" alt="PlutoXTeam Logo" class="logo" id="mainLogo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
                    <div class="logo-fallback" id="logoFallback" style="display:none;">
                        Pluto<span>XTeam</span>
                    </div>
                </div>
                
                <h2>Coba Gratis 3 Hari</h2>
                <div class="subtitle">Isi data untuk mendapatkan key trial</div>
                
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">✓</div>
                        <div class="feature-text">
                            <strong>Akses Penuh</strong>
                            Semua fitur aplikasi
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⚡</div>
                        <div class="feature-text">
                            <strong>Tanpa Iklan</strong>
                            Bebas gangguan iklan
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🔄</div>
                        <div class="feature-text">
                            <strong>Update Gratis</strong>
                            Semua pembaruan terbaru
                        </div>
                    </div>
                </div>
                
                <a href="${DOKU_LINK}" class="btn btn-buy" target="_blank">
                    💳 Beli Key Premium (Rp 50.000)
                </a>
                
                <div id="trialForm" style="margin-top: 20px; text-align: left;">
                    <div style="background: #f0f7ff; border-radius: 16px; padding: 20px; border: 1px solid #cce5ff;">
                        <h3 style="color: #0056b3; margin-bottom: 15px; font-size: 18px;">📋 Isi Data Trial</h3>
                        
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; color: #333; font-weight: 500;">Nama</label>
                            <input type="text" id="trialName" placeholder="Masukkan nama" style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px;">
                        </div>
                        
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; color: #333; font-weight: 500;">Nomor WhatsApp</label>
                            <input type="tel" id="trialPhone" placeholder="Contoh: 081234567890" style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px;">
                            <div style="font-size: 12px; color: #666; margin-top: 5px;">Gunakan kode negara 62</div>
                        </div>
                        
                        <button onclick="generateTrialKey('${deviceId}')" style="background: #28a745; color: white; border: none; padding: 14px; border-radius: 30px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer;">
                            🔑 Generate Key Trial
                        </button>
                    </div>
                </div>
                
                <div id="trialResult" style="display: none; margin-top: 20px;"></div>
                
                <a href="https://wa.me/${ADMIN_PHONE}?text=Halo%20admin%20PlutoXTeam%2C%20saya%20ingin%20bertanya" class="btn btn-admin" target="_blank">
                    📞 Hubungi Admin (085849299253)
                </a>
                
                <div class="footer">
                    <strong>PlutoXTeam</strong> • Trial hanya sekali per device
                </div>
            `;
        }
        
        // ============================================
        // GENERATE KEY TRIAL
        // ============================================
        window.generateTrialKey = async function(deviceId) {
            const name = document.getElementById('trialName').value.trim();
            let phone = document.getElementById('trialPhone').value.trim();
            
            if (!name || !phone) {
                alert('Nama dan nomor WhatsApp harus diisi!');
                return;
            }
            
            const formattedPhone = formatPhoneNumber(phone);
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Memproses...';
            
            // Generate key
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = 'TRIAL-';
            for (let i = 0; i < 4; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            key += '-';
            for (let i = 0; i < 4; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            
            const expireDate = new Date();
            expireDate.setDate(expireDate.getDate() + 3);
            const expireStr = expireDate.toLocaleDateString('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            
            try {
                // Simpan key di Keys
                await firebase.database().ref('Keys/' + key).set({
                    Type: 'Duration',
                    Value: '3d',
                    MaxDevices: 1,
                    ActivatedAt: Date.now(),
                    Devices: null
                });
                
                // Kirim via WHAPI
                try {
                    await fetch('https://gate.whapi.cloud/messages/text', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${WHAPI_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            to: formattedPhone,
                            body: `🎁 *KEY TRIAL PLUTOXTEAM 3 HARI* 🎁\n\nHalo ${name}, selamat mencoba!\n\n*Key Trial Anda:* \`${key}\`\n*Berlaku hingga:* ${expireStr}\n\nGunakan key ini untuk aktivasi trial selama 3 hari.\n\nSetelah habis, Anda bisa membeli key premium untuk akses penuh.\n\nSalam,\nPlutoXTeam`
                        })
                    });
                } catch (waError) {
                    console.log('WA gagal, tapi key tersimpan');
                }
                
                // Tampilkan hasil
                document.getElementById('trialForm').style.display = 'none';
                document.getElementById('trialResult').style.display = 'block';
                document.getElementById('trialResult').innerHTML = `
                    <div class="success-box">
                        <h3>✅ Key Trial Berhasil!</h3>
                        <div style="background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px;">
                            <div>Nama: ${name}</div>
                            <div>WA: ${formattedPhone}</div>
                            <div>Berlaku hingga: ${expireStr}</div>
                        </div>
                        
                        <div class="key-display">${key}</div>
                        
                        <button onclick="copyKey('${key}')" class="btn btn-copy">📋 Copy Key</button>
                        <p style="margin: 15px 0;">Key telah dikirim ke WhatsApp Anda.</p>
                        
                        <a href="${DOKU_LINK}" class="btn btn-buy" target="_blank">💳 Beli Premium (Rp 50.000)</a>
                        <button onclick="kembali()" class="btn" style="background: #28a745;">✅ Kembali</button>
                    </div>
                `;
                
                btn.disabled = false;
                
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal menyimpan key. Silakan coba lagi.');
                btn.disabled = false;
                btn.textContent = '🔑 Generate Key Trial';
            }
        };
        
        // Handle logo error
        window.handleLogoError = function() {
            const logo = document.getElementById('mainLogo');
            const fallback = document.getElementById('logoFallback');
            if (logo) logo.style.display = 'none';
            if (fallback) fallback.style.display = 'block';
        };
        
        // ============================================
        // LOGIKA UTAMA
        // ============================================
        async function init() {
            const container = document.getElementById('mainContainer');
            
            // Jika tidak ada device ID, tampilkan halaman utama
            if (!deviceId) {
                container.innerHTML = renderHomePage();
                return;
            }
            
            // Ada device ID, tampilkan loading
            container.innerHTML = renderTrialPage();
            
            try {
                // Cek trial_history
                const snapshot = await firebase.database().ref('trial_history/' + deviceId).once('value');
                
                if (snapshot.exists()) {
                    container.innerHTML = renderErrorPage(
                        'Trial Gagal',
                        'Device ini sudah pernah menggunakan trial sebelumnya.',
                        true
                    );
                } else {
                    container.innerHTML = renderTrialForm(deviceId);
                }
            } catch (error) {
                console.error('Firebase error:', error);
                container.innerHTML = renderErrorPage(
                    'Error',
                    'Terjadi kesalahan. Silakan coba lagi.',
                    true
                );
            }
        }
        
        // Jalankan
        init();
    </script>
</body>
</html>
